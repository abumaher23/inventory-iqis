services:
  - type: web
    name: iqis-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: iqis-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://inventory-iqis.vercel.app
      - key: PORT
        value: 10000

databases:
  - name: iqis-db
    databaseName: iqis
    user: iqis_user
